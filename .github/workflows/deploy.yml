name: Deploy Sites

on:
  push:
    branches: [main, 'staging/**']
    paths:
      - "sites/**"
      - "groups/**"
      - "monetization/**"
      - "overrides/**"
      - "org.yaml"
      - "network.yaml"
  pull_request:
    branches: [main]
    paths:
      - "sites/**"
      - "groups/**"
      - "monetization/**"
      - "overrides/**"
      - "org.yaml"
      - "network.yaml"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force rebuild all sites (ignores change detection)"
        type: boolean
        default: false

jobs:
  detect:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.detect.outputs.sites }}
    steps:
      - name: Checkout network data
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect which sites need rebuilding
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          FORCE_ALL: ${{ inputs.force_all }}
        run: |
          set -euo pipefail

          # Determine changed file list
          if [[ "$FORCE_ALL" == "true" ]]; then
            CHANGED="*"
          elif [[ "$EVENT" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA" || echo "*")
          else
            # push to main or workflow_dispatch without force_all
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "*")
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Read org-level default monetization (fallback when a site omits
          # `monetization:`). Errors ignored — missing file just means no default.
          ORG_DEFAULT_MONETIZATION=$(grep "^default_monetization:" org.yaml 2>/dev/null \
                                    | awk '{print $2}' | tr -d '"' || true)

          SITES_TO_BUILD=()

          for site_dir in sites/*/; do
            [[ -d "$site_dir" ]] || continue
            SITE=$(basename "$site_dir")
            # Read groups array (new style: "groups:\n  - a\n  - b") and
            # legacy single group field ("group: x")
            SITE_GROUPS=()
            if grep -q "^groups:" "sites/$SITE/site.yaml" 2>/dev/null; then
              while IFS= read -r line; do
                g=$(echo "$line" | sed 's/^[[:space:]]*-[[:space:]]*//' | tr -d '"')
                [[ -n "$g" ]] && SITE_GROUPS+=("$g")
              done < <(sed -n '/^groups:/,/^[^ -]/{ /^  *-/p }' "sites/$SITE/site.yaml" 2>/dev/null)
            fi
            LEGACY_GROUP=$(grep "^group:" "sites/$SITE/site.yaml" 2>/dev/null \
                    | awk '{print $2}' | tr -d '"' || true)
            if [[ ${#SITE_GROUPS[@]} -eq 0 && -n "$LEGACY_GROUP" ]]; then
              SITE_GROUPS+=("$LEGACY_GROUP")
            fi
            MONETIZATION=$(grep "^monetization:" "sites/$SITE/site.yaml" 2>/dev/null \
                           | awk '{print $2}' | tr -d '"' || true)
            # Fall back to org default when site doesn't set it explicitly.
            if [[ -z "$MONETIZATION" ]]; then
              MONETIZATION="$ORG_DEFAULT_MONETIZATION"
            fi

            should_build=false

            # First-commit / force: rebuild everything
            if echo "$CHANGED" | grep -q "^\*$"; then
              should_build=true
            # Site-specific files changed
            elif echo "$CHANGED" | grep -qE "^sites/${SITE}/"; then
              should_build=true
            # Site-specific shared-page override changed
            elif echo "$CHANGED" | grep -qE "^overrides/${SITE}/"; then
              should_build=true
            # Org-level config affects all sites
            elif echo "$CHANGED" | grep -q "^org\.yaml$"; then
              should_build=true
            # Network manifest change
            elif echo "$CHANGED" | grep -q "^network\.yaml$"; then
              should_build=true
            # Group config this site belongs to (check all groups)
            else
              for G in "${SITE_GROUPS[@]}"; do
                if echo "$CHANGED" | grep -q "^groups/${G}\.yaml$"; then
                  should_build=true
                  break
                fi
              done
            fi
            # Monetization profile this site uses (explicit or inherited)
            if [[ "$should_build" == "false" && -n "$MONETIZATION" ]] && echo "$CHANGED" | grep -q "^monetization/${MONETIZATION}\.yaml$"; then
              should_build=true
            fi

            if [[ "$should_build" == "true" ]]; then
              SITES_TO_BUILD+=("$SITE")
              echo "→ Will build: $SITE"
            else
              echo "→ Skipping:   $SITE (no relevant changes)"
            fi
          done

          if [[ ${#SITES_TO_BUILD[@]} -eq 0 ]]; then
            echo "sites=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${SITES_TO_BUILD[@]}" | jq -R . | jq -c -s .)
            echo "sites=$JSON" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.site }}
    needs: detect
    if: needs.detect.outputs.sites != '[]' && needs.detect.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}

    steps:
      - name: Checkout network data
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Staging branches only contain sites/<domain>/ content.
      # The build needs org.yaml, network.yaml, groups/, overrides/, etc.
      # which live on main. Overlay the latest main-branch copies so
      # resolve-config.ts can read them from the filesystem.
      - name: Overlay main-branch config (staging builds)
        if: startsWith(github.ref_name, 'staging/')
        run: |
          echo "Staging build — overlaying config files from origin/main"
          git checkout origin/main -- org.yaml network.yaml
          git checkout origin/main -- groups/ || true
          git checkout origin/main -- overrides/ || true
          git checkout origin/main -- monetization/ || true
          git checkout origin/main -- shared-pages/ || true
          git checkout origin/main -- ads-txt-assignments.json || true
          echo "Config overlay complete"

      - name: Checkout platform code
        uses: actions/checkout@v4
        with:
          repository: atomicfuse/atomic-content-platform
          path: platform
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('platform/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: platform
        run: pnpm install

      - name: Build shared-types
        working-directory: platform
        run: pnpm --filter @atomic-platform/shared-types build

      - name: Build ${{ matrix.site }}
        working-directory: platform/packages/site-builder
        env:
          SITE_DOMAIN: ${{ matrix.site }}
          NETWORK_DATA_PATH: ${{ github.workspace }}
          STAGING: ${{ startsWith(github.ref_name, 'staging/') && 'true' || 'false' }}
        run: pnpm build

      - name: Install wrangler globally
        # Globally so the binary is on PATH, irrespective of which working
        # directory we deploy from. Avoids npm choking on `workspace:*` deps
        # in packages/site-builder/package.json (npm doesn't understand that
        # protocol — only pnpm does).
        run: npm install --location=global wrangler@^4

      - name: Deploy to Cloudflare Pages
        working-directory: platform/packages/site-builder
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
        run: |
          PROJECT=$(echo "${{ matrix.site }}" | sed 's/\./-/g')
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Deploying ${{ matrix.site }} → project: $PROJECT, branch: $BRANCH"
          wrangler pages deploy dist --project-name="$PROJECT" --branch="$BRANCH"
