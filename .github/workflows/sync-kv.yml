name: Sync network data to KV

# Phase 5 of the Pages → Workers migration. Runs ALONGSIDE the legacy
# deploy.yml during migration — both workflows fire on the same events;
# sync-kv writes to CONFIG_KV_STAGING (and, on main, CONFIG_KV) so the
# new Astro + Workers app serves fresh config/articles. deploy.yml
# continues to rebuild the legacy Cloudflare Pages projects until the
# Phase-6/7 DNS cutover retires them.

on:
  push:
    branches: [main, 'staging/**']
    paths:
      - "sites/**"
      - "groups/**"
      - "monetization/**"
      - "overrides/**"
      - "org.yaml"
      - "network.yaml"
  pull_request:
    branches: [main]
    paths:
      - "sites/**"
      - "groups/**"
      - "monetization/**"
      - "overrides/**"
      - "org.yaml"
      - "network.yaml"
  workflow_dispatch:
    inputs:
      site:
        description: "Single site to sync (slug). Leave empty to detect from changed files."
        required: false
      force_all:
        description: "Ignore change detection; sync every site listed in dashboard-index.yaml"
        type: boolean
        default: false

# Prevent concurrent syncs to the same KV namespace. Concurrent bulk-put
# calls targeting the same article-index key can race, leaving a stale
# value even though each run reports success.
concurrency:
  group: sync-kv-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.detect.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect which sites need syncing
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          FORCE_ALL: ${{ inputs.force_all }}
          SINGLE_SITE: ${{ inputs.site }}
        run: |
          set -euo pipefail

          # Explicit single-site override wins.
          if [[ -n "$SINGLE_SITE" ]]; then
            JSON=$(printf '["%s"]' "$SINGLE_SITE")
            echo "sites=$JSON" >> "$GITHUB_OUTPUT"
            echo "→ Single site override: $SINGLE_SITE"
            exit 0
          fi

          if [[ "$FORCE_ALL" == "true" ]]; then
            CHANGED="*"
          elif [[ "$EVENT" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA" || echo "*")
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            # Push event: diff all commits in the push, not just the last one
            CHANGED=$(git diff --name-only "$BEFORE_SHA" "$HEAD_SHA" 2>/dev/null || echo "*")
          else
            # New branch push (before is all zeros) — diff against parent
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "*")
          fi

          echo "Changed files:"
          echo "$CHANGED"

          SITES_TO_SYNC=()
          for site_dir in sites/*/; do
            [[ -d "$site_dir" ]] || continue
            SITE=$(basename "$site_dir")
            should=false

            if echo "$CHANGED" | grep -q "^\*$"; then
              should=true
            elif echo "$CHANGED" | grep -qE "^sites/${SITE}/"; then
              should=true
            elif echo "$CHANGED" | grep -qE "^overrides/${SITE}/"; then
              should=true
            elif echo "$CHANGED" | grep -q "^org\.yaml$"; then
              should=true
            elif echo "$CHANGED" | grep -q "^network\.yaml$"; then
              should=true
            elif echo "$CHANGED" | grep -qE "^groups/" ; then
              # Any group change triggers a resync of every site that lists that
              # group. For simplicity (mirrors deploy.yml behaviour), this
              # step triggers all sites — the KV writer is cheap and idempotent.
              should=true
            elif echo "$CHANGED" | grep -qE "^overrides/config/" ; then
              # Config overrides target sites by group or domain — any change
              # could affect any site. Resync all, same as groups.
              should=true
            fi

            if [[ "$should" == "true" ]]; then
              SITES_TO_SYNC+=("$SITE")
              echo "→ Will sync: $SITE"
            else
              echo "→ Skipping:  $SITE (no relevant changes)"
            fi
          done

          if [[ ${#SITES_TO_SYNC[@]} -eq 0 ]]; then
            echo "sites=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${SITES_TO_SYNC[@]}" | jq -R . | jq -c -s .)
            echo "sites=$JSON" >> "$GITHUB_OUTPUT"
          fi

  sync:
    name: Sync ${{ matrix.site }}
    needs: detect
    if: needs.detect.outputs.sites != '[]' && needs.detect.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Overlay main-branch config (staging-branch runs)
        if: startsWith(github.ref_name, 'staging/')
        run: |
          # Staging branches only carry sites/<domain>/. The KV writer needs
          # org.yaml, groups, overrides, monetization from main — same idea
          # as legacy deploy.yml.
          echo "Staging run — overlaying shared config from origin/main"
          git checkout origin/main -- org.yaml network.yaml dashboard-index.yaml
          git checkout origin/main -- groups/ || true
          git checkout origin/main -- overrides/ || true
          git checkout origin/main -- monetization/ || true
          git checkout origin/main -- shared-pages/ || true

      - name: Checkout platform code
        uses: actions/checkout@v4
        with:
          repository: atomicfuse/atomic-content-platform
          path: platform
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('platform/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: platform
        run: |
          # Retry transient registry/network flakes before failing. A flaky
          # install would otherwise trip the failure() alert even though nothing
          # is wrong with the sites.
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile; then exit 0; fi
            echo "pnpm install failed (attempt $attempt/3) — retrying in 15s..."
            sleep 15
          done
          echo "::error::pnpm install failed after 3 attempts."
          exit 1

      - name: Build shared-types
        working-directory: platform
        run: pnpm --filter @atomic-platform/shared-types build

      - name: Sync ${{ matrix.site }} to KV
        working-directory: platform/packages/site-worker
        env:
          NETWORK_DATA_PATH: ${{ github.workspace }}
          # R2 bucket: ALWAYS atl-assets-prod. Both staging and production
          # Workers bind ASSET_BUCKET to atl-assets-prod (see wrangler.toml).
          # Assets are site-scoped by <siteId>/ prefix so sharing one bucket
          # is safe. Using a separate staging bucket causes 404s because the
          # Worker reads from atl-assets-prod regardless of environment.
          R2_BUCKET: atl-assets-prod
          KV_REMOTE: "true"
          R2_REMOTE: "true"
        run: |
          SITE="${{ matrix.site }}"

          # Dev1 legacy sites use Dev1 account credentials
          DEV1_SITES="financenewsbase muvizzcom"
          if echo "$DEV1_SITES" | grep -qw "$SITE"; then
            echo "→ Dev1 site detected: using Dev1 credentials"
            export CLOUDFLARE_API_TOKEN="${{ secrets.DEV1_CLOUDFLARE_API_TOKEN }}"
            export CLOUDFLARE_ACCOUNT_ID="${{ secrets.DEV1_CLOUDFLARE_ACCOUNT_ID }}"
            if [[ "${{ github.ref_name }}" == "main" ]]; then
              export KV_NAMESPACE_ID="${{ secrets.DEV1_KV_NAMESPACE_ID_PROD }}"
            else
              export KV_NAMESPACE_ID="${{ secrets.DEV1_KV_NAMESPACE_ID_STAGING }}"
            fi
          else
            export CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
            export CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
            if [[ "${{ github.ref_name }}" == "main" ]]; then
              export KV_NAMESPACE_ID="${{ secrets.KV_NAMESPACE_ID_PROD }}"
            else
              export KV_NAMESPACE_ID="${{ secrets.KV_NAMESPACE_ID_STAGING }}"
            fi
          fi

          # Derive hostnames from dashboard-index.yaml.
          # Always seed site:<domain>. Seed site:<custom_domain> + site:<pages_subdomain>.pages.dev where set.
          HOSTS="$(python3 -c "
          import yaml, sys
          with open('$GITHUB_WORKSPACE/dashboard-index.yaml') as f: data = yaml.safe_load(f)
          for s in data.get('sites', []):
              if s.get('domain') == '$SITE':
                  hs = [s['domain']]
                  if s.get('custom_domain'): hs.append(s['custom_domain'])
                  if s.get('pages_subdomain'): hs.append(s['pages_subdomain'] + '.pages.dev')
                  print(' '.join(hs))
                  break
          ")"
          echo "Hostnames for $SITE: $HOSTS"

          # seed:kv is idempotent — re-running completes a partial run. Retry
          # on transient failures (wrangler network blips, KV/R2 5xx) so a
          # momentary glitch doesn't fail the sync and fire a false alert.
          SEED_ATTEMPTS=3
          for attempt in $(seq 1 $SEED_ATTEMPTS); do
            if pnpm seed:kv "$SITE" $HOSTS; then
              echo "seed:kv succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -lt "$SEED_ATTEMPTS" ]; then
              echo "seed:kv failed (attempt $attempt/$SEED_ATTEMPTS) — retrying in 20s..."
              sleep 20
            else
              echo "::error::seed:kv failed after $SEED_ATTEMPTS attempts for $SITE — real failure."
              exit 1
            fi
          done

      - name: Verify article-index in KV
        working-directory: platform/packages/site-worker
        run: |
          SITE="${{ matrix.site }}"

          DEV1_SITES="financenewsbase muvizzcom"
          if echo "$DEV1_SITES" | grep -qw "$SITE"; then
            export CLOUDFLARE_API_TOKEN="${{ secrets.DEV1_CLOUDFLARE_API_TOKEN }}"
            export CLOUDFLARE_ACCOUNT_ID="${{ secrets.DEV1_CLOUDFLARE_ACCOUNT_ID }}"
            if [[ "${{ github.ref_name }}" == "main" ]]; then
              NS_ID="${{ secrets.DEV1_KV_NAMESPACE_ID_PROD }}"
            else
              NS_ID="${{ secrets.DEV1_KV_NAMESPACE_ID_STAGING }}"
            fi
          else
            export CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
            export CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
            if [[ "${{ github.ref_name }}" == "main" ]]; then
              NS_ID="${{ secrets.KV_NAMESPACE_ID_PROD }}"
            else
              NS_ID="${{ secrets.KV_NAMESPACE_ID_STAGING }}"
            fi
          fi

          # Count articles on disk (source of truth)
          # -maxdepth 1 mirrors the seeder, which loads ONLY top-level
          # sites/<site>/articles/*.md via a flat readdir (see loadArticles in
          # seed-kv.ts). Counting recursively here would flag any .md in a
          # subfolder as "missing from KV" forever — a false failure retries
          # can never clear.
          DISK_COUNT=$(find "$GITHUB_WORKSPACE/sites/$SITE/articles" -maxdepth 1 -name '*.md' 2>/dev/null | wc -l | tr -d ' ')
          echo "Articles on disk: $DISK_COUNT"

          # KV is EVENTUALLY CONSISTENT: the article-index read-back can lag the
          # bulk put by up to ~60s (longer under load). A one-shot read often
          # reads short and is NOT a real failure. Retry with backoff and only
          # treat a persistent shortfall as a failure — otherwise we fire false
          # "site down" alerts on a normal consistency lag.
          VERIFY_ATTEMPTS=4
          VERIFY_DELAY=120    # ~6 min worst case before alerting on a real shortfall
          KV_COUNT=0
          for attempt in $(seq 1 $VERIFY_ATTEMPTS); do
            KV_RAW=$(npx wrangler kv key get "article-index:$SITE" --namespace-id="$NS_ID" --remote 2>/dev/null || echo "[]")
            KV_COUNT=$(echo "$KV_RAW" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
            echo "Attempt $attempt/$VERIFY_ATTEMPTS — KV index: $KV_COUNT (disk: $DISK_COUNT)"
            if [ "$KV_COUNT" -ge "$DISK_COUNT" ]; then
              echo "Article-index consistent ($KV_COUNT >= $DISK_COUNT)"
              break
            fi
            if [ "$attempt" -lt "$VERIFY_ATTEMPTS" ]; then
              echo "KV behind disk — likely eventual-consistency lag; retrying in ${VERIFY_DELAY}s..."
              sleep "$VERIFY_DELAY"
            fi
          done

          if [ "$KV_COUNT" -lt "$DISK_COUNT" ]; then
            echo "::error::Article-index mismatch PERSISTED after ${VERIFY_ATTEMPTS} attempts (~$((VERIFY_ATTEMPTS * VERIFY_DELAY / 60)) min): KV has $KV_COUNT but disk has $DISK_COUNT. This is a real failure, not a consistency lag."
            exit 1
          fi

      - name: On-failure — record sync-status + notify
        if: failure()
        working-directory: platform/packages/site-worker
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SITE="${{ matrix.site }}"

          DEV1_SITES="financenewsbase muvizzcom"
          if echo "$DEV1_SITES" | grep -qw "$SITE"; then
            export CLOUDFLARE_API_TOKEN="${{ secrets.DEV1_CLOUDFLARE_API_TOKEN }}"
            export CLOUDFLARE_ACCOUNT_ID="${{ secrets.DEV1_CLOUDFLARE_ACCOUNT_ID }}"
            if [[ "${{ github.ref_name }}" == "main" ]]; then
              NS_ID="${{ secrets.DEV1_KV_NAMESPACE_ID_PROD }}"
            else
              NS_ID="${{ secrets.DEV1_KV_NAMESPACE_ID_STAGING }}"
            fi
          else
            export CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
            export CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
            if [[ "${{ github.ref_name }}" == "main" ]]; then
              NS_ID="${{ secrets.KV_NAMESPACE_ID_PROD }}"
            else
              NS_ID="${{ secrets.KV_NAMESPACE_ID_STAGING }}"
            fi
          fi
          FAIL_PAYLOAD=$(jq -nc --arg sha "$GITHUB_SHA" --arg at "$(date -u +%FT%TZ)" \
                         '{gitSha: $sha, committedAt: $at, syncedAt: $at, ok: false, error: "CI sync failed"}')
          npx wrangler kv key put "sync-status:${{ matrix.site }}" "$FAIL_PAYLOAD" \
            --namespace-id="$NS_ID" --remote || true

          # Notify Slack — PRODUCTION (main) only, and only after every in-step
          # retry above is exhausted, so this fires solely on genuine, persistent
          # failures. Staging-branch failures are dev-time noise: still recorded
          # in sync-status (above) but never paged. The message is deliberately
          # non-alarming — a failed sync does NOT take a site down; the live site
          # keeps serving its last-synced KV content.
          if [[ "${{ github.ref_name }}" == "main" && -n "$SLACK_WEBHOOK_URL" ]]; then
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"⚠️ KV sync needs attention for *${{ matrix.site }}* (sha ${GITHUB_SHA:0:7}). This is not an outage — the live site keeps serving its last-synced content; the latest update just didn't apply. Retried automatically and still failed. Details: ${RUN_URL}\"}" \
              || true
          fi
