id: mock-ads
name: Mock Ads (Demo)
scripts:
  head: []
  body_start: []
  body_end:
    - id: mock-ad-fill
      src: /mock-ad-fill.js
ads_config:
  interstitial: true
  interstitial_config:
    script_url: "https://example.com/mock-interstitial.js"
    script_inline: ""
    trigger:
      type: delay
      delay_seconds: 5
      scroll_percent: 50
    frequency:
      type: once_per_session
      max_per_session: 1
    page_types:
      - all
    close_delay_seconds: 3
  layout: standard
  ad_placements:
    # Article / Page: above-content banner
    - id: top-banner
      position: above-content
      device: all
      sizes: {}
      desktopSizeConfig:
        ratio: { x: 16, y: 9 }
        range: { minWidth: null, maxWidth: null, minHeight: null, maxHeight: null }
        customSizes: []
      mobileSizeConfig:
        ratio: { x: 16, y: 9 }
        range: { minWidth: null, maxWidth: null, minHeight: null, maxHeight: null }
