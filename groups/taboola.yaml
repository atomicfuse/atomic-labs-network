group_id: taboola
name: "Taboola Exclusive Sites"

tracking:
  ga4: null
  gtm: null
  google_ads: "AW-XXXXXXXXX"
  facebook_pixel: null
  custom: []

scripts:
  head:
    - id: gpt-script
      src: "https://securepubads.g.doubleclick.net/tag/js/gpt.js"
      async: true
    - id: network-alpha-init
      inline: |
        window.alphaAds = window.alphaAds || [];
        window.alphaAds.push({
          siteId: '{{alpha_site_id}}',
          zone: '{{alpha_zone}}',
          autoRender: true
        });
    - id: network-alpha-loader
      src: "https://cdn.alpha-adnetwork.com/sdk/v3/loader.js"
      async: true
  body_start: []
  body_end:
    - id: interstitial-trigger
      inline: |
        if ('{{interstitial_enabled}}' === 'true') {
          window.alphaAds.push({ type: 'interstitial', delay: 30000 });
        }
    - id: mock-ad-fill
      src: "/mock-ad-fill.js"

scripts_vars:
  alpha_site_id: ""
  alpha_zone: ""
  interstitial_enabled: "false"

ads_config:
  interstitial: true
  layout: high-density
  ad_placements:
    - id: "top-banner"
      position: above-content
      sizes:
        desktop: [[728, 90], [970, 90]]
        mobile: [[320, 50], [320, 100]]
      device: all
    - id: "in-content-1"
      position: after-paragraph-3
      sizes:
        desktop: [[336, 280], [300, 250]]
        mobile: [[300, 250], [336, 280]]
      device: all
    - id: "in-content-2"
      position: after-paragraph-7
      sizes:
        desktop: [[336, 280], [300, 250]]
        mobile: [[300, 250]]
      device: all
    - id: "sidebar-sticky"
      position: sidebar
      sizes:
        desktop: [[300, 600], [160, 600], [300, 250]]
      device: desktop
    - id: "mobile-anchor"
      position: sticky-bottom
      sizes:
        mobile: [[320, 50]]
      device: mobile
    - id: "homepage-top-banner"
      position: homepage-top
      sizes:
        desktop: [[970, 90]]
        mobile: [[320, 50]]
      device: all
    - id: "category-banner"
      position: category-top
      sizes:
        desktop: [[728, 90]]
        mobile: [[320, 50]]
      device: all

ads_txt:
  - "google.com, pub-XXXXXXXXXXXXX, DIRECT, f08c47fec0942fa0"
  - "advertising.com, 28246, DIRECT"
  - "rubiconproject.com, 19116, DIRECT"
