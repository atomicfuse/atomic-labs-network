monetization_id: premium-ads
name: "Premium Ad Network"
provider: alpha-adnetwork

tracking:
  ga4: null
  gtm: null
  google_ads: "AW-XXXXXXXXX"
  facebook_pixel: null
  custom: []

scripts:
  head:
    - id: gpt-script
      src: "https://securepubads.g.doubleclick.net/tag/js/gpt.js"
      async: true
    - id: network-alpha-init
      inline: |
        window.alphaAds = window.alphaAds || [];
        window.alphaAds.push({
          siteId: '{{alpha_site_id}}',
          zone: '{{alpha_zone}}',
          autoRender: true
        });
    - id: network-alpha-loader
      src: "https://cdn.alpha-adnetwork.com/sdk/v3/loader.js"
      async: true
  body_start: []
  body_end:
    - id: interstitial-trigger
      inline: |
        if ('{{interstitial_enabled}}' === 'true') {
          window.alphaAds.push({ type: 'interstitial', delay: 30000 });
        }
    - id: mock-ad-fill
      src: "/mock-ad-fill.js"

scripts_vars:
  alpha_site_id: ""
  alpha_zone: ""
  interstitial_enabled: "false"

ads_config:
  primary_advertiser: alpha-adnetwork
  interstitial: true
  layout: high-density
  ad_placements:
    - id: top-banner
      position: above-content
      device: all
      sizes:
        desktop: [[728, 90], [970, 250]]
        mobile: [[320, 50]]
    - id: in-content-1
      position: after-paragraph-3
      device: all
      sizes:
        desktop: [[300, 250], [336, 280]]
        mobile: [[300, 250], [336, 280]]
    - id: in-content-2
      position: after-paragraph-7
      device: all
      sizes:
        desktop: [[300, 250], [336, 280]]
        mobile: [[300, 250], [336, 280]]
    - id: in-content-3
      position: after-paragraph-12
      device: all
      sizes:
        desktop: [[300, 250], [336, 280]]
        mobile: [[300, 250], [336, 280]]
    - id: sidebar-sticky
      position: sidebar
      device: desktop
      sizes:
        desktop: [[300, 600], [160, 600]]
    - id: mobile-anchor
      position: sticky-bottom
      device: mobile
      sizes:
        mobile: [[320, 50], [320, 100]]

ads_txt:
  - "google.com, pub-1234567890123456, DIRECT, f08c47fec0942fa0"
  - "advertising.com, 28246, DIRECT"
  - "appnexus.com, 10239, RESELLER, f5ab79cb980f11d1"
  - "openx.com, 537120563, RESELLER, 6a698e2ec38604c6"
  - "rubiconproject.com, 17346, RESELLER, 0bfd66d529a55807"
  - "pubmatic.com, 159078, RESELLER, 5d62403b186f2ace"
  - "indexexchange.com, 186046, RESELLER"
