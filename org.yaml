organization: "Atomic Labs"
legal_entity: "Atomic Labs Ltd"
company_address: "Tel Aviv, Israel"
support_email_pattern: "contact@{{domain}}"

default_theme: modern

default_fonts:
  heading: "Inter"
  body: "Inter"

# Sites without explicit groups inherit these default groups.
default_groups:
  - adsense-default

tracking:
  ga4: null
  gtm: null
  google_ads: null
  facebook_pixel: null
  custom: []

scripts:
  head: []
  body_start: []
  body_end: []

scripts_vars: {}

ads_config:
  interstitial: false
  in_content_slots: 2
  sidebar: false
  layout: standard
  ad_placements: []

# Reserved height (px) for ad placeholders to prevent CLS while
# ad-loader.js fetches and renders ads at runtime.
ad_placeholder_heights:
  above-content: 90
  after-paragraph: 280
  sidebar: 600
  sticky-bottom: 50

ads_txt: []

legal:
  company_name: "Atomic Labs Ltd"
  company_country: "Israel"
  effective_date: "2026-01-01"
