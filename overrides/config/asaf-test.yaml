override_id: asaf-test
name: asaf-ads-test
priority: 2
targets:
  groups: []
  sites:
    - travelswire
    - aliensrus
    - funnypigeon
tracking:
  ga4: null
  gtm: null
  google_ads: null
  facebook_pixel: null
  facebook_domain_verification: null
  custom: []
scripts:
  head:
    - id: digi-widget
      src: https://digi-widget.pages.dev/atl.widget.js
  body_start: []
  body_end: []
  before_footer: []
scripts_vars: {}
ads_config:
  interstitial: false
  interstitial_config:
    script_url: ""
    script_inline: ""
    trigger:
      type: delay
      delay_seconds: 5
      scroll_percent: 50
    frequency:
      type: once_per_session
      max_per_session: 1
    page_types:
      - all
    close_delay_seconds: 3
    device: both
    exclude_pages: []
  layout: standard
  ad_placements: []
ads_txt: []
activation:
  query_param: asaf
  query_value: "22"
theme: {}
legal: {}
