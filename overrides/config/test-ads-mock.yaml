override_id: test-ads-mock
name: "Test Ads (Mock Demo)"
priority: 100

targets:
  sites:
    - coolnews-atl

# tracking: merge (default) — only ga4 is overridden, GTM + Google Ads preserved from groups
tracking:
  ga4: "G-TESTDEMO000"

# scripts: merge_by_id (default) — gilad-1 and mock-ad-fill add to existing group scripts
# Group scripts (gpt-script, alpha-init, alpha-loader, interstitial-trigger) are preserved
scripts:
  head:
    - id: gilad-1
      src: http://whatever.com/123.js
      async: true
  body_end:
    - id: mock-ad-fill
      src: "/mock-ad-fill.js"

# ads_config: replace (explicit) — full ad layout swap for mock testing
ads_config:
  _mode: replace
  interstitial: false
  layout: standard
  ad_placements:
    - id: "top-banner"
      position: above-content
      sizes:
        desktop: [[728, 90], [970, 90]]
        mobile: [[320, 50], [320, 100]]
      device: all
    - id: "in-content-1"
      position: after-paragraph-3
      sizes:
        desktop: [[336, 280], [300, 250]]
        mobile: [[300, 250]]
      device: all
    - id: "in-content-2"
      position: after-paragraph-7
      sizes:
        desktop: [[336, 280], [300, 250]]
        mobile: [[300, 250]]
      device: all
    - id: "sidebar-sticky"
      position: sidebar
      sizes:
        desktop: [[300, 600], [160, 600], [300, 250]]
      device: desktop
    - id: "mobile-anchor"
      position: sticky-bottom
      sizes:
        desktop: [[0, 120]]
        mobile: [[320, 50]]
      device: all

# ads_txt: add (default) — no entries to add, group chain's ads.txt preserved
ads_txt: []
