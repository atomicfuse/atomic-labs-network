domain: coolnews-atl
site_name: Cool News ATL
site_tagline: null
pages_project: coolnews-atl

# Groups: merged left-to-right. Theme from news, ad config from taboola.
# The test-ads-mock override targets this site automatically for mock ads.
groups:
  - news
  - taboola

active: true

# Site-level tracking overrides (set to null to explicitly disable inheritance).
tracking:
  ga4: "G-COOLNEWS-XXX"

# Fills {{placeholder}} variables in the resolved scripts.
scripts_vars:
  alpha_site_id: "coolnews-atl-001"
  alpha_zone: "news"
  interstitial_enabled: "false"

brief:
  audience: ""
  tone: processional, drammatic
  article_types:
    listicle: 40
    standard: 30
    how-to: 20
    review: 10
  topics:
    - Current Events
    - In-Depth Analysis
    - Policy & Politics
    - Local Stories
  seo_keywords_focus: []
  content_guidelines: []
  vertical: News
  review_percentage: 5
  schedule:
    preferred_days:
      - Monday
      - Tuesday
      - Wednesday
      - Thursday
      - Friday
      - Sunday
    preferred_time: 10:00
    articles_per_day: 3

theme:
  base: modern
  logo: /assets/logo.png
  favicon: /assets/logo.png
