  content_guidelines:
    - Always frame unverified information as speculation, never fact. Use attribution phrases like "sources say," "reports suggest," or question-format headlines. Never fabricate quotes from named individuals, and avoid stating a celebrity's health, legal, or relationship status as confirmed unless they said it publicly themselves. Political content, content about minors, and anything that could read as harassment of a named individual should not be published.
  image_guidelines:
    - Never use celebrity photos found via Google Images, social media screenshots, or other entertainment sites — assume every image online is protected unless you can verify the license. Safe sources are press release photos, images the celebrity posted on their own public account (with attribution), or photos from an active licensed subscription like Getty Editorial. Every image published must include a credit line with the photographer name and agency.
