ads_config:
  interstitial: true
  interstitial_config:
    script_url: ""
    script_inline: |
      (function() {
        var cfg = window.__ATL_INTERSTITIAL_CONFIG__ || {};
        var CLOSE_DELAY = (cfg.close_delay_seconds != null) ? cfg.close_delay_seconds : 3;
        var overlay = document.createElement("div");
        overlay.style.cssText = "position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif";
        var card = document.createElement("div");
        card.style.cssText = "background:#fff;border-radius:16px;padding:28px;max-width:680px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative";
        var title = document.createElement("div");
        title.textContent = "You may like:";
        title.style.cssText = "font-size:18px;font-weight:700;color:#222;margin-bottom:16px";
        card.appendChild(title);
        var grid = document.createElement("div");
        grid.style.cssText = "display:grid;grid-template-columns:repeat(3,1fr);gap:12px";
        var ads = [["Sale for Doll","#ff6b6b"],["Sale for Teddy Bear","#4ecdc4"],["Sale for Tennis","#45b7d1"],["Sale for Toys","#f7b731"],["Sale for Games","#a55eea"],["Sale for Kids","#26de81"]];
        ads.forEach(function(ad) {
          var item = document.createElement("div");
          item.textContent = ad[0];
          item.style.cssText = "background:" + ad[1] + ";min-height:130px;border-radius:14px;color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;text-align:center;padding:12px;cursor:pointer";
          grid.appendChild(item);
        });
        card.appendChild(grid);
        var closeBtn = document.createElement("button");
        function activateClose() {
          closeBtn.textContent = "\u2715";
          closeBtn.disabled = false;
          closeBtn.style.cssText = "position:absolute;top:12px;right:16px;background:none;border:none;font-size:22px;color:#666;cursor:pointer;padding:4px";
        }
        function doClose() { if (closeBtn.disabled) return; overlay.style.opacity = "0"; setTimeout(function(){ overlay.remove(); }, 300); }
        if (CLOSE_DELAY <= 0) { activateClose(); } else {
          closeBtn.disabled = true;
          closeBtn.textContent = String(CLOSE_DELAY);
          closeBtn.style.cssText = "position:absolute;top:12px;right:16px;background:rgba(0,0,0,0.08);border:none;font-size:13px;color:#999;cursor:default;padding:4px 8px;border-radius:4px;font-weight:600;min-width:28px;text-align:center";
          var rem = CLOSE_DELAY;
          var iv = setInterval(function() { rem--; if (rem > 0) { closeBtn.textContent = String(rem); } else { clearInterval(iv); activateClose(); } }, 1000);
        }
        closeBtn.onclick = doClose;
        card.appendChild(closeBtn);
        overlay.appendChild(card);
        overlay.addEventListener("click", function(e) { if (e.target === overlay) doClose(); });
        document.body.appendChild(overlay);
      })();
    trigger:
      type: delay
      delay_seconds: 1
      scroll_percent: 50
    frequency:
      type: custom
      max_per_session: 30
    page_types:
      - homepage
    close_delay_seconds: 1
  layout: standard
